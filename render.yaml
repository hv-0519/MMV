services:
  - type: web
    name: mmv
    runtime: node
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache"
    startCommand: "php artisan migrate --seed --force && php artisan storage:link && php -S 0.0.0.0:$PORT -t public"
    envVars:
      - key: APP_NAME
        value: MMV
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: mmv-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mmv-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mmv-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mmv-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mmv-db
          property: password

databases:
  - name: mmv-db
    plan: free
    databaseName: mmv_db
    user: mmv_user
